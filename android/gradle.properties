org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Workaround for Kotlin two-drive bug: pub cache is on C:\ and the project
# is on D:\, so RelocatableFileToPathConverter.toPath() crashes when it
# tries to compute a relative path. Disabling the incremental cache
# bypasses that path entirely. Build is slightly slower but doesn't fail.
kotlin.incremental=false
