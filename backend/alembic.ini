# Alembic configuration for Swasth backend.
#
# Run from backend/ — `cd backend && alembic upgrade head`.
# DATABASE_URL is read from env via config.settings.DATABASE_URL inside
# migrations/env.py — there is intentionally NO sqlalchemy.url here so
# we never accidentally commit a connection string.

[alembic]
script_location = migrations

# Add backend/ to sys.path so env.py can import config, database, models.
prepend_sys_path = .

# Sequential revision IDs (0001, 0002, ...) — easier to reason about than
# random hashes. Rev IDs are passed explicitly via --rev-id when creating
# new revisions; see migrations/README.
file_template = %%(rev)s_%%(slug)s

# Stamp migration timestamps in UTC.
timezone = UTC

# Use OS path separator for version paths.
version_path_separator = os

[post_write_hooks]
# none — we keep migrations as-written.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
