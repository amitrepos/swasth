# Swasth DEV — port 8007 backend + Flutter web
server {
    listen 80;
    server_name dev.swasth.app;  # Change to your domain or use: default_server

    # Flutter Web (static files)
    root /var/www/swasth/web;
    index index.html;

    # API requests → FastAPI backend
    location /api/ {
        proxy_pass http://127.0.0.1:8007;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:8007;
    }

    # API docs
    location /docs {
        proxy_pass http://127.0.0.1:8007;
    }
    location /openapi.json {
        proxy_pass http://127.0.0.1:8007;
    }

    # Flutter web — serve index.html for all routes (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }
}

