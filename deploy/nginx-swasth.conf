# swasth.health + www — interest form (port 8080)
server {
    server_name swasth.health www.swasth.health;
    location / { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/swasth.health/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/swasth.health/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# app.swasth.health — Flutter web prod
server {
    server_name app.swasth.health;
    root /var/www/swasth/web;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/swasth.health/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/swasth.health/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# api.swasth.health — prod API
server {
    server_name api.swasth.health;
    location / { proxy_pass http://127.0.0.1:8007; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_read_timeout 60s; }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/swasth.health/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/swasth.health/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# staging-api.swasth.health — staging API
server {
    server_name staging-api.swasth.health;
    location / { proxy_pass http://127.0.0.1:8008; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_read_timeout 60s; }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/swasth.health/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/swasth.health/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# HTTP → HTTPS redirects (managed by Certbot)
server {
    if ($host = www.swasth.health) { return 301 https://$host$request_uri; }
    if ($host = swasth.health) { return 301 https://$host$request_uri; }
    listen 80;
    server_name swasth.health www.swasth.health;
    return 404;
}
server {
    if ($host = app.swasth.health) { return 301 https://$host$request_uri; }
    listen 80;
    server_name app.swasth.health;
    return 404;
}
server {
    if ($host = api.swasth.health) { return 301 https://$host$request_uri; }
    listen 80;
    server_name api.swasth.health;
    return 404;
}
server {
    if ($host = staging-api.swasth.health) { return 301 https://$host$request_uri; }
    listen 80;
    server_name staging-api.swasth.health;
    return 404;
}

# staging-app.swasth.health — Flutter web staging
server {
    server_name staging-app.swasth.health;
    root /var/www/swasth_staging/web;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/staging-app.swasth.health/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/staging-app.swasth.health/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = staging-app.swasth.health) { return 301 https://$host$request_uri; }
    server_name staging-app.swasth.health;
    listen 80;
    return 404;
}
