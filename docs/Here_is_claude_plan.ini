 Plan: Rewrite Swasth PRFAQ — Amazon-Style, Grounded in Reality                                                 
                                                                                                                
 Context                                                                                                        
                                                                                                                
 The current PRFAQ (docs/Swasth_PRFAQ (1) (1).md) describes an aspirational product — 3 BLE devices, 500+ food  
 recognition, pharmacy networks, monthly doctor reports — most of which doesn't exist. The user wants a rewrite 
  that is specific, honest, and structured in true Amazon PRFAQ style. The goal is a document that works for    
 investors, partners, and internal alignment.                                                                   
                                                                                                                
 What's wrong with the current PRFAQ

 - Claims features that don't exist (food photo intelligence, pharmacy delivery, smart health band, doctor
 portal)
 - Generic language ("eat better", "live longer") instead of specific mechanisms
 - Fabricated customer quotes (Priya Menon, Rajesh Kumar) — useful as archetypes but presented as real
 - FAQs are softball — doesn't address hard investor questions (unit economics, CAC, retention, regulatory)
 - No flywheel or business mechanics explanation
 - Mixes what exists with what's imagined without distinguishing them

 Approach: Collaborative Rewrite in 4 Phases

 Phase 1: Feature Inventory (What's Real)

 Rewrite the file starting with a grounded feature list split into two columns:

 BUILT & WORKING:
 - Glucose monitoring (manual + BLE + camera OCR via Gemini Vision)
 - Blood pressure monitoring (manual + BLE, Omron device support)
 - BMI tracking with WHO categories and actionable tips
 - AI health assistant (Gemini 2.5 Flash, context-aware with 30-day history, image analysis for lab reports)
 - Multi-profile family system (owner/viewer/editor roles, email invites)
 - Critical value alerts to family members (email)
 - 7/30/90-day trend charts with AI-generated summaries
 - Health score (0-100) with streak gamification
 - Hindi + English localization
 - Offline mode with sync queue
 - AES-256-GCM encryption for health data (SPDI compliance)
 - Admin dashboard with engagement/retention/clinical metrics

 PLANNED (not built):
 - Food photo intelligence / nutrition tracking
 - Smart health band (steps, sleep, SpO2, heart rate)
 - Push notifications (currently email-only)
 - Pharmacy integration
 - Doctor portal with monthly reports
 - WhatsApp Business API alerts
 - PDF report export

 Phase 2: Customer Segments & Feature Mapping

 Define 3-4 specific customer personas with real pain points, then map which existing features solve which
 pain:

 1. The Worried NRI Child (30-40, abroad, parents in India with diabetes/hypertension)
   - Pain: "I call, they say they're fine, I don't believe them"
   - Features: family monitoring, critical alerts, trend visibility, AI insights
 2. The Newly Diagnosed Patient (45-60, just told they have diabetes or hypertension)
   - Pain: "Doctor gave me numbers but I don't know what to do day-to-day"
   - Features: AI coaching, health score, BMI tips, trend charts, BLE device sync
 3. The Rural/Semi-Urban Patient (50-70, limited tech comfort, Hindi-speaking)
   - Pain: "I can't read English apps, I forget to check, I don't understand the numbers"
   - Features: Hindi support, simple BLE sync, family member manages setup, critical alerts
 4. The Family Doctor (managing 50+ chronic patients, sees them every 3-6 months)
   - Pain: "I only see them twice a year, I have no idea what happens in between"
   - Features: admin dashboard, trend data, AI summaries (future: doctor portal)

 Phase 3: The Flywheel

 User logs reading → AI gives specific feedback → User sees improvement in trends →
 Streak/score motivates daily logging → More data makes AI smarter →
 Family sees dashboard, encourages user → User stays engaged →
 → loops back to: User logs reading
 Outer loop: More users → more data → better AI models → better outcomes → word of mouth → more users

 Phase 4: Real FAQs

 Replace softball questions with hard ones. Structure:

 Customer FAQs (specific, not generic):
 - "My parent doesn't use smartphones. How does this work?"
 - "What happens if a reading is dangerously high at 2 AM?"
 - "How is this different from just buying a glucometer from Amazon?"
 - "Does the AI replace my doctor?"

 Investor FAQs (the hard questions):
 - "What's your unit economics? Hardware margin vs subscription revenue?"
 - "What's your retention at D30? D90?"
 - "How do you acquire customers? What's CAC?"
 - "You're competing with Apple Health, Google Fit — why would you win?"
 - "What's the regulatory path for AI health recommendations?"
 - "How do you handle liability if the AI gives bad advice?"
 - "What's your data moat?"
 - "Why India first? Why not US/EU where willingness to pay is higher?"
 - "How do you prevent churn after the novelty wears off?"
 - "What's your path to 1M users?"
 - "How does this work without internet in rural Bihar?"
 - "What's your IP? Can someone copy this in 6 months?"

 Technical FAQs:
 - "How accurate is the AI vs a real doctor?"
 - "What happens to data if the company shuts down?"
 - "How do you handle conflicting readings or device errors?"

