name: Daniel PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    # Skip Daniel for PRs that only touch docs/text — saves tokens. Code PRs
    # always run Daniel regardless of which other paths they also touch.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'AUDIT.md'

concurrency:
  group: daniel-review-same-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Daniel reviews PR
    runs-on: ubuntu-latest

    # Same-repo PRs only. Fork PRs use daniel-pr-review-fork.yml (pull_request_target)
    # so CLAUDE_CODE_OAUTH_TOKEN is available — GitHub does not pass secrets to
    # pull_request workflows triggered from forks.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login != 'amitrepos' &&
      !endsWith(github.event.pull_request.user.login, '[bot]') &&
      !contains(github.event.pull_request.title, '[skip-daniel]')

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run Daniel review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            /daniel-review

            You are reviewing PR #${{ github.event.pull_request.number }} in ${{ github.repository }},
            opened by @${{ github.event.pull_request.user.login }}.

            PR title: ${{ github.event.pull_request.title }}
            Head SHA: ${{ github.event.pull_request.head.sha }}

            Follow the GitHub PR Reviews section in your SKILL.md exactly.

            Severity-aware review event (STRICT):
            - If your review contains 1+ CRITICAL issues → use `--request-changes`.
              These are correctness/security/compliance bugs that must block merge.
            - If your review contains zero CRITICAL issues (MEDIUM/MINOR only, or clean)
              → use `--comment`. MEDIUM/MINOR are advisory and must NEVER block merges.
            - Never use `--approve` from CI. Approvals are reserved for humans.

            1. Post the structured summary review (CRITICAL/MEDIUM/MINOR + verdict) via
               `gh pr review ${{ github.event.pull_request.number }} --request-changes|--comment --body ...`
               per the rule above.
            2. Post inline line comments pinned to exact lines via the
               `POST /repos/{owner}/{repo}/pulls/{number}/reviews` API.
               Use `"event": "REQUEST_CHANGES"` only when 1+ CRITICAL, else `"event": "COMMENT"`.

            Do NOT write the pre-commit review marker — that is a local-only concept and
            does not apply to PRs opened by other team members.
          claude_args: >-
            --model claude-sonnet-4-6
            --max-turns 60
            --allowedTools "Bash(gh pr review:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh api:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(cat -n:*),Read,Grep,Glob"

      # GitHub keeps a reviewer's CHANGES_REQUESTED as the active blocking state until that SAME
      # reviewer APPROVES or the review is dismissed — new commits do NOT clear it. Daniel never
      # APPROVES from CI (only request-changes / comment), so a fixed PR would stay blocked on a stale
      # request forever. This step clears that: if THIS run's review is no longer requesting changes
      # (i.e. no CRITICAL remained), dismiss any earlier CHANGES_REQUESTED reviews by the bot.
      - name: Clear stale Daniel CHANGES_REQUESTED when the latest review is clean
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          REVIEWS=$(gh api "repos/$REPO/pulls/$PR/reviews" --paginate \
            --jq '[.[] | select(.user.login=="github-actions[bot]")]')
          LATEST=$(printf '%s' "$REVIEWS" | jq -r '.[-1].state // ""')
          echo "latest bot review state: ${LATEST:-none}"
          if [ "$LATEST" = "CHANGES_REQUESTED" ]; then
            echo "Current Daniel review still requests changes — leaving the block in place."
            exit 0
          fi
          printf '%s' "$REVIEWS" | jq -r '.[] | select(.state=="CHANGES_REQUESTED") | .id' | while read -r ID; do
            [ -n "$ID" ] || continue
            gh api -X PUT "repos/$REPO/pulls/$PR/reviews/$ID/dismissals" \
              -f message="Auto-dismissed: a later Daniel review found no CRITICAL issues, so this earlier change-request is stale." \
              -f event="DISMISS" >/dev/null \
              && echo "dismissed stale CHANGES_REQUESTED review $ID" \
              || echo "::warning::could not dismiss review $ID (branch protection may restrict dismissals)"
          done
