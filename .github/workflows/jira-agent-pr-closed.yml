name: JIRA Agent — PR closed → update JIRA

# Fires when a PR authored by the JIRA agent automation is closed.
# Extracts the ticket key from the branch name (`feat/<key>-...`), then:
#   - merged    → label `agent-status:merged`, transition JIRA → `Done`
#   - closed    → label `agent-status:closed-without-merge`, leave status
#
# Non-agent PRs (branch name doesn't match `^feat/[a-z]+-[0-9]+-`) are skipped.

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: read
  statuses: read
  checks: read

jobs:
  notify_jira:
    name: Update JIRA on PR close
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: startsWith(github.event.pull_request.head.ref, 'feat/')
    env:
      JIRA_URL: ${{ secrets.JIRA_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      BRANCH: ${{ github.event.pull_request.head.ref }}
      MERGED: ${{ github.event.pull_request.merged }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: master

      - name: Extract ticket key from branch
        id: extract
        run: |
          # feat/nuo-92-some-slug → NUO-92
          TICKET=$(echo "$BRANCH" | sed -nE 's@^feat/([a-z]+)-([0-9]+).*@\U\1-\2@p')
          if [ -z "$TICKET" ]; then
            echo "Branch '$BRANCH' did not parse to a JIRA ticket key; skipping."
            echo "ticket=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ticket=$TICKET" >> "$GITHUB_OUTPUT"

      # WS7 — Matt posts a completion summary on merge (what was built, PR link, change size, checks).
      # Deterministic (composed from PR metadata via the API) so it is reliable and free — no model call.
      - name: Update JIRA — merged path (Matt completion summary)
        if: steps.extract.outputs.ticket != '' && env.MERGED == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          ADDS: ${{ github.event.pull_request.additions }}
          DELS: ${{ github.event.pull_request.deletions }}
          NFILES: ${{ github.event.pull_request.changed_files }}
        run: |
          TICKET="${{ steps.extract.outputs.ticket }}"
          # Top changed files (best-effort; non-fatal).
          FILES=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" --json files \
            -q '.files[].path' 2>/dev/null | head -8 | sed 's/^/  - /' || true)
          # Whether the merge commit's checks were green (best-effort).
          CHECKS=$(gh pr checks "$PR_NUM" --repo "${{ github.repository }}" 2>/dev/null \
            | awk '{print $2}' | sort | uniq -c | tr '\n' ' ' || echo "n/a")
          {
            echo "✅ **Matt — implementation complete and merged.**"
            echo ""
            echo "**What was built:** ${PR_TITLE}"
            echo "**PR:** ${PR_URL} (merged as \`${MERGE_SHA}\`)"
            echo "**Change size:** ${NFILES} files, +${ADDS} / -${DELS}"
            echo "**CI checks at merge:** ${CHECKS}"
            if [ -n "$FILES" ]; then echo ""; echo "**Key files:**"; echo "$FILES"; fi
            echo ""
            echo "— Matt (automation builder)"
          } > /tmp/completion.md
          bash scripts/jira_comment.sh "$TICKET" @/tmp/completion.md
          bash scripts/jira_set_status_label.sh "$TICKET" merged || true
          bash scripts/jira_transition.sh "$TICKET" "Done" || echo "::warning::jira_transition non-fatal failure"

      - name: Update JIRA — closed-without-merge path
        if: steps.extract.outputs.ticket != '' && env.MERGED != 'true'
        run: |
          TICKET="${{ steps.extract.outputs.ticket }}"
          bash scripts/jira_comment.sh "$TICKET" \
            "PR closed without merge: ${{ github.event.pull_request.html_url }}"
          bash scripts/jira_set_status_label.sh "$TICKET" closed-without-merge || true
