name: DEV Auto Deploy

# Deploys to AWS staging backend (staging-api.swasth.health) on every master push.
# Runs tests first — backend + Flutter. No Flutter web deploy (staging is API-only).
on:
  push:
    branches: [master]

jobs:
  # ── Run tests first ────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Run pytest with coverage (fails below 85%)
        run: python -m pytest tests/ -v --tb=short --cov=. --cov-config=.coveragerc

  flutter-checks:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Create .env for asset bundling
        run: echo "SERVER_HOST=http://localhost:8000" > .env
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - run: flutter test

  # ── Deploy staging backend to AWS ─────────────────────────────────────────
  # Restarts swasth-staging (port 8008) → staging-api.swasth.health
  # Shares codebase at /var/www/swasth with prod backend (different PM2 process).
  deploy-staging-backend:
    name: Deploy Staging Backend to AWS
    needs: [backend-tests, flutter-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy backend to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "backend/"
          target: "/var/www/swasth/"
          overwrite: true

      - name: Install deps + migrate + restart staging
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            source /var/www/swasth/venv/bin/activate
            cd /var/www/swasth/backend
            pip install -r requirements.txt -q

            echo "Running Alembic migrations..."
            current_rev=$(alembic current 2>/dev/null | awk '{print $1}' | grep -E '^[0-9]{4}$' || true)
            if [ -z "$current_rev" ]; then
              echo "  First-time alembic adoption — stamping at 0002"
              alembic stamp 0002 || { echo "❌ alembic stamp 0002 failed"; exit 1; }
            else
              echo "  Current revision: $current_rev"
            fi
            alembic upgrade head || { echo "❌ alembic upgrade head failed"; exit 1; }
            echo "✅ Alembic migrations complete"

            pm2 restart swasth-staging || SERVER_PORT=8008 pm2 start "python3 -B main.py" --name "swasth-staging" --cwd /var/www/swasth/backend
            echo "✅ Staging backend deployed (staging-api.swasth.health)"

      - name: Verify staging health
        run: |
          sleep 5
          curl -s --max-time 10 https://staging-api.swasth.health/health | grep -q '"status":"healthy"'
          echo "✅ staging-api.swasth.health is healthy"
