name: DEV Auto Deploy

on:
  push:
    branches: [master]

jobs:
  # ── Run tests first ────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Run pytest with coverage (fails below 85%)
        run: python -m pytest tests/ -v --tb=short --cov=. --cov-config=.coveragerc

  flutter-checks:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Create .env for asset bundling
        run: echo "SERVER_HOST=http://localhost:8000" > .env
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - run: flutter test

  # ── Deploy backend to DEV ──────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to DEV
    needs: [backend-tests, flutter-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy DEV FastAPI
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/swasth
            # Hard-reset to origin/master instead of `git pull` — the
            # pull was silently failing whenever the server's local
            # repo diverged (e.g. from manual in-place edits or old
            # merge artifacts), leaving dev stuck on stale code. The
            # reset is idempotent, immune to divergence, and always
            # produces a working tree that exactly matches origin.
            # Any legitimate in-place admin work should go through a
            # PR, not a direct file edit on the server.
            git fetch origin master
            git reset --hard origin/master
            echo "✅ Repo synced to $(git rev-parse --short HEAD)"

            source venv/bin/activate
            cd backend
            pip install -r requirements.txt

            # Run any new DB migrations. Each migration script is
            # idempotent (checks for column existence before ALTER)
            # so re-running on every deploy is safe. If you add a
            # new migration, append it here.
            echo "Running DB migrations..."
            for f in migrate_add_doctor_link_states.py; do
              if [ -f "$f" ]; then
                echo "  → $f"
                python3 "$f" || { echo "❌ Migration $f failed"; exit 1; }
              fi
            done
            echo "✅ Migrations complete"

            # Restart or start the DEV backend via PM2
            pm2 restart swasth-backend || pm2 start "python3 main.py" --name "swasth-backend" --cwd /var/www/swasth/backend
            echo "✅ Backend DEV deployed on port 8007"

  # ── Build & deploy Flutter web to DEV ──────────────────────────────────────
  deploy-web:
    name: Deploy Flutter Web to DEV
    needs: [backend-tests, flutter-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .env for asset bundling
        run: echo "SERVER_HOST=http://localhost:8000" > .env

      - run: flutter pub get

      - name: Build Flutter Web
        run: |
          flutter build web --release \
            --dart-define=SERVER_HOST=https://${{ secrets.SERVER_HOST }}:8443

      - name: Deploy web to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/web/*"
          target: "/var/www/swasth/web"
          strip_components: 2
          overwrite: true

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo nginx -t && sudo systemctl reload nginx
            echo "✅ Flutter Web DEV deployed"
