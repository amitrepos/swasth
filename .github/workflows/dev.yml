name: DEV Auto Deploy

on:
  push:
    branches: [master]

jobs:
  # ── Run tests first ────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Run pytest with coverage (fails below 85%)
        run: python -m pytest tests/ -v --tb=short --cov=. --cov-config=.coveragerc

  flutter-checks:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Create .env for asset bundling
        run: echo "SERVER_HOST=http://localhost:8000" > .env
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - run: flutter test

  # ── Deploy backend to DEV ──────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to DEV
    needs: [backend-tests, flutter-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy DEV FastAPI
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/swasth
            git pull origin master
            source venv/bin/activate
            cd backend
            pip install -r requirements.txt

            # Restart or start the DEV backend via PM2
            pm2 restart swasth-backend || pm2 start "python3 main.py" --name "swasth-backend" --cwd /var/www/swasth/backend
            echo "✅ Backend DEV deployed on port 8007"

  # ── Build & deploy Flutter web to DEV ──────────────────────────────────────
  deploy-web:
    name: Deploy Flutter Web to DEV
    needs: [backend-tests, flutter-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .env for asset bundling
        run: echo "SERVER_HOST=http://localhost:8000" > .env

      - run: flutter pub get

      - name: Build Flutter Web
        run: |
          flutter build web --release \
            --dart-define=SERVER_HOST=http://${{ secrets.SERVER_HOST }}:8010

      - name: Deploy web to server
        uses: appleboy/scp-action@v0.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/web/*"
          target: "/var/www/swasth/web"
          strip_components: 2
          overwrite: true

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo nginx -t && sudo systemctl reload nginx
            echo "✅ Flutter Web DEV deployed"
