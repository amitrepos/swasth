name: CI

on:
  push:
    branches: [master, "feature/**", "fix/**", "test/**", "docs/**"]
  pull_request:
    branches: [master]

jobs:
  # ── Change detection — gates backend/flutter jobs on relevant paths only ──
  # Prevents CI from running backend pytest for a docs-only or .claude/*
  # settings PR. Mirrors the local pre-push hook's doc-only skip logic.
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      flutter: ${{ steps.filter.outputs.flutter }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            flutter:
              - 'lib/**'
              - 'test/**'
              - 'pubspec.yaml'
              - 'pubspec.lock'
              - '.github/workflows/ci.yml'

  # ── Backend tests (Python / FastAPI) ──────────────────────────────────────
  backend-tests:
    name: Backend Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest with coverage (fails below 85%)
        run: python -m pytest tests/ -v --tb=short --cov=. --cov-config=.coveragerc

  # ── Flutter analysis + tests ──────────────────────────────────────────────
  flutter-checks:
    name: Flutter Analyze & Test
    needs: detect-changes
    if: needs.detect-changes.outputs.flutter == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .env for asset bundling
        run: echo "SERVER_HOST=http://localhost:8000" > .env

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (zero errors required)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test
