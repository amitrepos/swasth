name: Agent Platform — Guard Tests

# Runs the WS2 guard-hook + sandbox-seam test suite. Blocks PRs that regress a deterministic
# guardrail. Cheap (pure bash + jq), no app build required.

on:
  push:
    branches: [master]
    paths:
      - '.claude/scripts/**'
      - '.claude/*.json'
      - '.claude/settings.json'
      - 'scripts/compute_required_reviewers.py'
      - 'scripts/classify_diff_sensitivity.py'
      - 'scripts/orchestrator_claim.py'
      - 'scripts/summarize_agent_audit.py'
      - 'scripts/md_to_adf.py'
      - 'scripts/jira_fetch_ticket.py'
      - 'tests/agent-platform/**'
      - '.github/workflows/agent-platform-tests.yml'
  pull_request:
    paths:
      - '.claude/scripts/**'
      - '.claude/*.json'
      - '.claude/settings.json'
      - 'scripts/compute_required_reviewers.py'
      - 'scripts/classify_diff_sensitivity.py'
      - 'scripts/orchestrator_claim.py'
      - 'scripts/summarize_agent_audit.py'
      - 'scripts/md_to_adf.py'
      - 'scripts/jira_fetch_ticket.py'
      - 'tests/agent-platform/**'
      - '.github/workflows/agent-platform-tests.yml'

permissions:
  contents: read

jobs:
  guard-tests:
    name: Guard hooks + sandbox seam
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Run guard test suite
        run: bash tests/agent-platform/test_hook_guards.sh

      - name: Run orchestrator-claim tests
        run: python3 tests/agent-platform/test_orchestrator_claim.py

      - name: Validate all workflow YAML parses
        run: |
          python3 - <<'PY'
          import glob, sys, yaml
          bad = []
          for f in glob.glob('.github/workflows/*.yml'):
              try:
                  yaml.safe_load(open(f))
              except Exception as e:
                  bad.append(f"{f}: {e}")
          if bad:
              print("\n".join(bad)); sys.exit(1)
          print("all workflow YAML valid")
          PY
