name: PROD Deploy

# Auto-deploys on every push to master, keeping prod in sync with the merged
# state. Also manually triggerable for emergency deploys (e.g., rollbacks,
# re-running a failed deploy, or deploying a non-master branch for a quick fix
# that's been cherry-picked).
#
# Why auto + manual:
# - Auto on master push eliminates the "forgot to click Run workflow" drift
#   that caused the 2026-04-18 incident (prod was 11 commits behind master
#   because nobody had manually dispatched since 2026-04-12).
# - Manual workflow_dispatch stays available for:
#     • Rollbacks (trigger on a revert commit)
#     • Re-running a deploy that failed mid-way (e.g., migration error)
#     • Hot-patching without pushing to master
on:
  push:
    branches: [master]
  workflow_dispatch:

# Prevent concurrent deploys clobbering each other. If a new master push
# arrives while a deploy is running, cancel the in-flight one and start fresh.
concurrency:
  group: prod-deploy
  cancel-in-progress: true

jobs:
  # ── Stage 1: deploy backend ────────────────────────────────────────────────
  # Runs FIRST. Frontend deploy depends on this to eliminate the race where
  # `git reset --hard` in backend-deploy would overwrite web/ after web deploy
  # wrote to it.
  deploy-backend:
    name: Deploy Backend to PROD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy PROD FastAPI
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/swasth_prod
            # Hard-reset to origin/master. Prod should never have in-place
            # edits that aren't in master.
            git fetch origin master
            git reset --hard origin/master
            echo "✅ Repo synced to $(git rev-parse --short HEAD)"

            # venv lives at /var/www/swasth_prod/venv/ (sibling of backend/),
            # not inside backend/. Activate BEFORE cd-ing into backend/.
            source venv/bin/activate
            cd backend
            pip install -r requirements.txt

            # Run any new DB migrations. Each migration script is
            # idempotent and safe to re-run.
            echo "Running DB migrations..."
            for f in migrate_*.py; do
              if [ -f "$f" ]; then
                echo "  → $f"
                python3 "$f" || { echo "❌ Migration $f failed"; exit 1; }
              fi
            done
            echo "✅ Migrations complete"

            # Restart or start the PROD backend via PM2
            pm2 restart swasth-prod || pm2 start "python3 -B main.py" --name "swasth-prod" --cwd /var/www/swasth_prod/backend
            echo "✅ Backend PROD deployed"

  # ── Stage 2: build & deploy Flutter web ────────────────────────────────────
  # Runs AFTER deploy-backend succeeds. This prevents the race where
  # `git reset --hard` in backend-deploy would overwrite the built web/
  # artifacts that web-deploy just scp'd.
  deploy-web:
    name: Deploy Flutter Web to PROD
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .env for asset bundling
        run: echo "SERVER_HOST=http://localhost:8000" > .env

      - run: flutter pub get

      - name: Build Flutter Web
        run: |
          flutter build web --release \
            --target lib/main_production.dart \
            --dart-define=SERVER_HOST=https://${{ secrets.SERVER_HOST }}:8444

      - name: Deploy web to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/web/*"
          target: "/var/www/swasth_prod/web"
          strip_components: 2
          overwrite: true

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo nginx -t && sudo systemctl reload nginx
            echo "✅ Flutter Web PROD deployed"

  # ── Stage 3: post-deploy smoke test ────────────────────────────────────────
  # Validates that the freshly-deployed stack actually works before we consider
  # the deploy successful. Would have caught the 2026-04-18 drift incident.
  smoke-test:
    name: Post-deploy smoke test
    needs: [deploy-backend, deploy-web]
    runs-on: ubuntu-latest
    steps:
      - name: Hit production health endpoint
        run: |
          set -e
          echo "=== /health ==="
          curl -sk --max-time 10 https://${{ secrets.SERVER_HOST }}:8444/health | tee /tmp/health.json
          grep -q '"status":"healthy"' /tmp/health.json
          echo "✅ /health returns healthy"

      - name: Verify supported reading_types end-to-end
        env:
          SMOKE_EMAIL: ${{ secrets.SMOKE_USER_EMAIL }}
          SMOKE_PASS: ${{ secrets.SMOKE_USER_PASSWORD }}
          HOST: ${{ secrets.SERVER_HOST }}
        run: |
          set -e
          # Skip if smoke-test credentials aren't configured yet
          if [ -z "$SMOKE_EMAIL" ] || [ -z "$SMOKE_PASS" ]; then
            echo "⚠️  SMOKE_USER_* secrets not set — skipping reading_type smoke test."
            echo "    To enable: add SMOKE_USER_EMAIL and SMOKE_USER_PASSWORD in repo secrets."
            exit 0
          fi

          # Use a single Python script to drive the whole smoke test. This avoids
          # the shell-interpolation-into-JSON trap where a password character
          # that's harmless to bash (e.g. a stray quote) silently breaks the
          # JSON body, the server returns 400, and curl pipes "no access_token"
          # to the next stage producing a cryptic KeyError.
          python3 <<'PYEOF'
          import json, os, sys, urllib.request, ssl

          HOST  = os.environ["HOST"]
          EMAIL = os.environ["SMOKE_EMAIL"]
          PASS  = os.environ["SMOKE_PASS"]
          BASE  = f"https://{HOST}:8444"

          # Production uses a self-signed cert — smoke test ignores cert verification
          # exactly as the mobile app does in its HTTPS overrides.
          CTX = ssl.create_default_context()
          CTX.check_hostname = False
          CTX.verify_mode = ssl.CERT_NONE

          def post(path, body, token=None):
              req = urllib.request.Request(
                  BASE + path,
                  data=json.dumps(body).encode(),
                  headers={"Content-Type": "application/json",
                           **({"Authorization": f"Bearer {token}"} if token else {})},
                  method="POST",
              )
              try:
                  with urllib.request.urlopen(req, context=CTX, timeout=15) as r:
                      return r.status, json.loads(r.read() or b"{}")
              except urllib.error.HTTPError as e:
                  return e.code, json.loads(e.read() or b"{}")

          def get(path, token):
              req = urllib.request.Request(
                  BASE + path,
                  headers={"Authorization": f"Bearer {token}"},
              )
              with urllib.request.urlopen(req, context=CTX, timeout=15) as r:
                  return json.loads(r.read())

          # ── Login ────────────────────────────────────────────────────────
          status, body = post("/api/auth/login", {"email": EMAIL, "password": PASS})
          if status != 200 or "access_token" not in body:
              print(f"❌ Login failed: HTTP {status}, body={body}")
              sys.exit(1)
          token = body["access_token"]
          print(f"✅ Login OK (email={EMAIL}, pw_len={len(PASS)})")

          # ── Get profile ──────────────────────────────────────────────────
          profiles = get("/api/profiles", token)
          if not profiles:
              print("❌ No profiles visible to smoke user")
              sys.exit(1)
          profile_id = profiles[0]["id"]
          print(f"✅ Profile ID: {profile_id}")

          # ── POST every reading_type the app supports ─────────────────────
          # If master adds a new reading_type, add it here too — that's how
          # this test stays in sync with the app. `unit_display` is required
          # by the HealthReadingCreate schema, so we pass a sensible unit
          # per type. We assert 200/201 (accepted) — 400 would mean the type
          # is unknown to the backend (stale deploy), 422 would mean our
          # payload is missing required fields.
          UNITS = {
              "blood_pressure": "mmHg",
              "glucose":        "mg/dL",
              "spo2":           "%",
              "steps":          "steps",
              "weight":         "kg",
          }
          for rt, unit in UNITS.items():
              payload = {
                  "profile_id": profile_id,
                  "reading_type": rt,
                  "value_numeric": 0,
                  "unit_display": unit,
                  "reading_timestamp": "2026-01-01T00:00:00Z",
              }
              # Include type-specific fields so the backend's semantic
              # validators have something to chew on. value_numeric=0 is
              # intentionally nonsensical for most metrics — we're testing
              # the write path, not the clinical correctness.
              if rt == "blood_pressure":
                  payload.update(systolic=0, diastolic=0, bp_unit="mmHg")
              elif rt == "glucose":
                  payload.update(glucose_value=0, glucose_unit="mg/dL")
              elif rt == "spo2":
                  payload.update(spo2_value=0, spo2_unit="%")
              elif rt == "steps":
                  payload.update(steps_count=0)
              elif rt == "weight":
                  payload.update(weight_value=0, weight_unit="kg")

              status, body = post("/api/readings", payload, token=token)
              if status in (200, 201):
                  print(f"✅ reading_type={rt} accepted (HTTP {status})")
              else:
                  print(f"❌ reading_type={rt} rejected: HTTP {status}, body={body}")
                  sys.exit(1)

          print("✅ All reading_types round-trip to production")
          PYEOF
