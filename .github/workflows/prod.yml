name: PROD Deploy

# Auto-deploys on every push to master. Manually triggerable for rollbacks.
# AWS Mumbai (ap-south-1): EC2 t3.micro, Elastic IP 13.127.215.113
# Prod backend: api.swasth.health | Flutter web: app.swasth.health
on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: prod-deploy
  cancel-in-progress: true

jobs:
  # ── Stage 1: deploy backend ────────────────────────────────────────────────
  # EC2 was set up via tar+scp (no .git on server) — we scp backend/ from the
  # GitHub runner instead of git-pulling on the server.
  deploy-backend:
    name: Deploy Backend to PROD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy backend to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "backend/"
          target: "/var/www/swasth/"
          overwrite: true

      - name: Install deps + migrate + restart PROD
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            source /var/www/swasth/venv/bin/activate
            cd /var/www/swasth/backend
            pip install -r requirements.txt -q

            echo "Running Alembic migrations..."
            current_rev=$(alembic current 2>/dev/null | awk '{print $1}' | grep -E '^[0-9]{4}$' || true)
            if [ -z "$current_rev" ]; then
              echo "  First-time alembic adoption — stamping at 0002"
              alembic stamp 0002 || { echo "❌ alembic stamp 0002 failed"; exit 1; }
            else
              echo "  Current revision: $current_rev"
            fi
            alembic upgrade head || { echo "❌ alembic upgrade head failed"; exit 1; }
            echo "✅ Alembic migrations complete (head: $(alembic current 2>/dev/null | awk '{print $1}'))"

            pm2 restart swasth-backend || pm2 start "python3 -B main.py" --name "swasth-backend" --cwd /var/www/swasth/backend
            echo "✅ Backend PROD deployed (api.swasth.health)"

  # ── Stage 2: build & deploy Flutter web ────────────────────────────────────
  # Uses main_production.dart — flavor.dart bakes api.swasth.health into the JS.
  # No --dart-define=SERVER_HOST needed; flavor is the sole source of truth.
  deploy-web:
    name: Deploy Flutter Web to PROD
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .env for asset bundling
        run: echo "SERVER_HOST=http://localhost:8000" > .env

      - run: flutter pub get

      - name: Build Flutter Web (production)
        run: |
          flutter build web --release \
            --target lib/main_production.dart

      - name: Deploy web to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/web/*"
          target: "/var/www/swasth/web"
          strip_components: 2
          overwrite: true

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo nginx -t && sudo systemctl reload nginx
            echo "✅ Flutter Web PROD deployed (app.swasth.health)"

  # ── Stage 3: post-deploy smoke test ────────────────────────────────────────
  smoke-test:
    name: Post-deploy smoke test
    needs: [deploy-backend, deploy-web]
    runs-on: ubuntu-latest
    steps:
      - name: Hit production health endpoint
        run: |
          set -e
          echo "=== /health ==="
          curl -s --max-time 10 https://api.swasth.health/health | tee /tmp/health.json
          grep -q '"status":"healthy"' /tmp/health.json
          echo "✅ /health returns healthy"

      - name: Verify supported reading_types end-to-end
        env:
          SMOKE_EMAIL: ${{ secrets.SMOKE_USER_EMAIL }}
          SMOKE_PASS: ${{ secrets.SMOKE_USER_PASSWORD }}
        run: |
          set -e
          if [ -z "$SMOKE_EMAIL" ] || [ -z "$SMOKE_PASS" ]; then
            echo "⚠️  SMOKE_USER_* secrets not set — skipping reading_type smoke test."
            exit 0
          fi

          python3 <<'PYEOF'
          import json, os, sys, urllib.request

          EMAIL = os.environ["SMOKE_EMAIL"]
          PASS  = os.environ["SMOKE_PASS"]
          BASE  = "https://api.swasth.health"

          def post(path, body, token=None):
              req = urllib.request.Request(
                  BASE + path,
                  data=json.dumps(body).encode(),
                  headers={"Content-Type": "application/json",
                           **({"Authorization": f"Bearer {token}"} if token else {})},
                  method="POST",
              )
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      return r.status, json.loads(r.read() or b"{}")
              except urllib.error.HTTPError as e:
                  return e.code, json.loads(e.read() or b"{}")

          def get(path, token):
              req = urllib.request.Request(
                  BASE + path,
                  headers={"Authorization": f"Bearer {token}"},
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  return json.loads(r.read())

          status, body = post("/api/auth/login", {"email": EMAIL, "password": PASS})
          if status != 200 or "access_token" not in body:
              print(f"❌ Login failed: HTTP {status}, body={body}")
              sys.exit(1)
          token = body["access_token"]
          print(f"✅ Login OK (email={EMAIL})")

          profiles = get("/api/profiles/", token)
          if not profiles:
              print("❌ No profiles visible to smoke user")
              sys.exit(1)
          profile_id = profiles[0]["id"]
          print(f"✅ Profile ID: {profile_id}")

          UNITS = {
              "blood_pressure": "mmHg",
              "glucose":        "mg/dL",
              "spo2":           "%",
              "steps":          "steps",
              "weight":         "kg",
          }
          for rt, unit in UNITS.items():
              payload = {
                  "profile_id": profile_id,
                  "reading_type": rt,
                  "value_numeric": 0,
                  "unit_display": unit,
                  "reading_timestamp": "2026-01-01T00:00:00Z",
              }
              if rt == "blood_pressure":
                  payload.update(systolic=0, diastolic=0, bp_unit="mmHg")
              elif rt == "glucose":
                  payload.update(glucose_value=0, glucose_unit="mg/dL")
              elif rt == "spo2":
                  payload.update(spo2_value=0, spo2_unit="%")
              elif rt == "steps":
                  payload.update(steps_count=0)
              elif rt == "weight":
                  payload.update(weight_value=0, weight_unit="kg")

              status, body = post("/api/health/readings", payload, token=token)
              if status in (200, 201):
                  print(f"✅ reading_type={rt} accepted (HTTP {status})")
              else:
                  print(f"❌ reading_type={rt} rejected: HTTP {status}, body={body}")
                  sys.exit(1)

          print("✅ All reading_types round-trip to production")
          PYEOF
