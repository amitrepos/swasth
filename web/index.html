<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="swasth_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Swasth - Your Health Companion</title>
  <link rel="manifest" href="manifest.json">
  
  <style>
    /* Loading overlay shown while Flutter engine initializes */
    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      transition: opacity 0.3s ease-out;
    }
    
    #loading-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    
    .loading-logo-img {
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(14, 165, 233, 0.3);
      animation: pulse 2s ease-in-out infinite;
      border-radius: 24px;
    }
    
    .loading-title {
      font-size: 32px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 8px;
    }
    
    .loading-subtitle {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 40px;
    }
    
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #e2e8f0;
      border-top-color: #0ea5e9;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    .loading-text {
      margin-top: 16px;
      font-size: 14px;
      color: #64748b;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Loading overlay shown immediately while Flutter loads -->
  <div id="loading-overlay">
    <img src="icons/Icon-192.png" alt="Swasth Logo" class="loading-logo-img">
    <div class="loading-title">Swasth</div>
    <div class="loading-subtitle">Your Health Companion</div>
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading your health dashboard...</div>
  </div>
  
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  
  <script>
    // Hide loading overlay once Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      const overlay = document.getElementById('loading-overlay');
      if (overlay) {
        overlay.classList.add('fade-out');
        setTimeout(() => {
          overlay.remove();
        }, 300);
      }
    });
  </script>
</body>
</html>
