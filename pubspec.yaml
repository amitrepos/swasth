name: swasth_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # BLE
  flutter_blue_plus: ^1.32.0

  # Permissions
  permission_handler: ^11.0.0

  # State management
  flutter_riverpod: ^2.5.0

  # Charts
  fl_chart: ^0.68.0

  # HTTP client
  http: ^1.1.0

  # Secure storage for tokens
  flutter_secure_storage: ^9.0.0

  # Environment variables
  flutter_dotenv: ^5.1.0
  
  # Date formatting
  intl: ^0.19.0

  # Typography — Inter as SF Pro web-safe fallback
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true